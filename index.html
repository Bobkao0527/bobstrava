<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS 紀錄儀 Pro</title>
    
    <!-- PWA Meta -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        #map { height: 35vh; width: 100%; border-radius: 24px; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        .speed-value { font-size: 4rem; line-height: 1; font-weight: 900; }
        
        /* 隱藏 Leaflet 浮水印以增加簡潔感 */
        .leaflet-control-attribution { display: none; }
        
        /* 錄製狀態動畫 */
        @keyframes pulse-red {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .recording-pulse { animation: pulse-red 2s infinite; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen flex flex-col p-4 gap-4 overflow-hidden">

    <!-- 頂部儀表板 -->
    <div class="glass p-6 rounded-[32px] shadow-sm flex flex-col gap-4 border border-white">
        <div class="flex justify-between items-start">
            <div>
                <h1 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Current Speed</h1>
                <div class="flex items-baseline gap-2">
                    <span id="speedDisplay" class="speed-value text-slate-800">0</span>
                    <span class="text-xl font-bold text-slate-400">km/h</span>
                </div>
            </div>
            <div id="recordingStatus" class="hidden flex items-center gap-2 bg-red-50 text-red-600 px-3 py-1 rounded-full text-xs font-bold">
                <div class="w-2 h-2 bg-red-500 rounded-full recording-pulse"></div>
                REC
            </div>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white/50 p-3 rounded-2xl border border-slate-100">
                <p class="text-[10px] text-slate-400 font-bold uppercase">Accuracy</p>
                <p class="mono text-sm font-bold text-blue-600"><span id="accDisplay">--</span> m</p>
            </div>
            <div class="bg-white/50 p-3 rounded-2xl border border-slate-100">
                <p class="text-[10px] text-slate-400 font-bold uppercase">Trip Distance</p>
                <p class="mono text-sm font-bold text-slate-700"><span id="distDisplay">0.00</span> km</p>
            </div>
        </div>
    </div>

    <!-- 中間地圖區 -->
    <div class="relative flex-grow">
        <div id="map" class="shadow-inner border border-slate-200"></div>
        <button onclick="recenter()" class="absolute bottom-4 right-4 z-[400] bg-white p-3 rounded-2xl shadow-lg active:scale-90 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-slate-700"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg>
        </button>
    </div>

    <!-- 底部控制與紀錄管理 -->
    <div class="glass p-5 rounded-[32px] shadow-lg flex flex-col gap-4 border border-white">
        <div class="flex gap-3">
            <button id="toggleBtn" onclick="toggleRecording()" class="flex-grow bg-slate-900 text-white h-16 rounded-2xl font-bold text-lg flex items-center justify-center gap-2 active:scale-95 transition-all">
                <div id="btnIcon" class="w-3 h-3 bg-red-500 rounded-full"></div>
                <span id="btnText">開始紀錄</span>
            </button>
            <button onclick="clearHistory()" class="w-16 bg-slate-100 text-slate-400 rounded-2xl flex items-center justify-center active:bg-red-50 active:text-red-500 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path></svg>
            </button>
        </div>

        <div class="flex justify-between items-center px-2">
            <div class="flex flex-col">
                <span class="text-[10px] text-slate-400 font-bold uppercase">Stored Points</span>
                <span id="pointCount" class="mono text-sm font-bold text-slate-700">0 pts</span>
            </div>
            <div class="text-right">
                <span class="text-[10px] text-slate-400 font-bold uppercase">Coordinates</span>
                <p id="coordDisplay" class="mono text-[10px] text-slate-500">--.----, --.----</p>
            </div>
        </div>
    </div>

    <script>
        let map, marker, pathLine, watchId;
        let isRecording = false;
        let history = JSON.parse(localStorage.getItem('gps_history') || '[]');
        let currentPath = [];
        let lastPosition = null;
        let totalDistance = 0;

        // 初始化
        function init() {
            map = L.map('map', { zoomControl: false }).setView([25.033, 121.565], 16);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

            pathLine = L.polyline([], { color: '#3b82f6', weight: 5, opacity: 0.7 }).addTo(map);
            
            updateUI();
            startTracking();
        }

        // 開始追蹤
        function startTracking() {
            if (!navigator.geolocation) return alert("不支援定位");

            watchId = navigator.geolocation.watchPosition((pos) => {
                const { latitude, longitude, accuracy, speed } = pos.coords;
                const timestamp = pos.timestamp;
                const currentCoords = [latitude, longitude];

                // 1. 更新儀表板
                document.getElementById('coordDisplay').innerText = `${latitude.toFixed(4)}, ${longitude.toFixed(4)}`;
                document.getElementById('accDisplay').innerText = Math.round(accuracy);
                
                // 處理速度 (m/s 轉 km/h)
                let kmh = 0;
                if (speed !== null && speed > 0) {
                    kmh = speed * 3.6;
                } else if (lastPosition) {
                    // 如果硬體沒給速度，用距離計算
                    const d = calculateDistance(lastPosition.coords.latitude, lastPosition.coords.longitude, latitude, longitude);
                    const t = (timestamp - lastPosition.timestamp) / 1000;
                    if (t > 0) kmh = (d / t) * 3.6;
                }
                document.getElementById('speedDisplay').innerText = kmh > 1 ? Math.round(kmh) : 0;

                // 2. 更新地圖標記
                if (!marker) {
                    marker = L.circleMarker(currentCoords, { radius: 8, color: '#fff', fillColor: '#3b82f6', fillOpacity: 1, weight: 3 }).addTo(map);
                } else {
                    marker.setLatLng(currentCoords);
                }
                
                // 3. 如果正在記錄，存入歷史
                if (isRecording) {
                    const point = { lat: latitude, lng: longitude, spd: kmh, time: timestamp };
                    history.push(point);
                    currentPath.push(currentCoords);
                    pathLine.setLatLngs(currentPath);
                    
                    if (lastPosition) {
                        totalDistance += calculateDistance(lastPosition.coords.latitude, lastPosition.coords.longitude, latitude, longitude);
                        document.getElementById('distDisplay').innerText = (totalDistance / 1000).toFixed(2);
                    }
                    
                    saveToStorage();
                    updateUI();
                }

                lastPosition = pos;
                map.panTo(currentCoords);

            }, (err) => console.error(err), {
                enableHighAccuracy: true,
                maximumAge: 0
            });
        }

        // 切換紀錄狀態
        function toggleRecording() {
            isRecording = !isRecording;
            const btn = document.getElementById('toggleBtn');
            const btnText = document.getElementById('btnText');
            const btnIcon = document.getElementById('btnIcon');
            const status = document.getElementById('recordingStatus');

            if (isRecording) {
                btn.classList.replace('bg-slate-900', 'bg-red-500');
                btnText.innerText = "停止紀錄";
                btnIcon.classList.replace('bg-red-500', 'bg-white');
                btnIcon.classList.add('rounded-sm'); // 變成正方形(停止鈕)
                status.classList.remove('hidden');
                // 開始新路徑時清空當前地圖線條
                currentPath = [];
                totalDistance = 0;
            } else {
                btn.classList.replace('bg-red-500', 'bg-slate-900');
                btnText.innerText = "開始紀錄";
                btnIcon.classList.replace('bg-white', 'bg-red-500');
                btnIcon.classList.remove('rounded-sm');
                status.classList.add('hidden');
            }
        }

        // 計算距離 (Haversine formula - 公尺)
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function saveToStorage() {
            localStorage.setItem('gps_history', JSON.stringify(history));
        }

        function clearHistory() {
            if (confirm("確定要刪除所有紀錄點嗎？")) {
                history = [];
                currentPath = [];
                totalDistance = 0;
                pathLine.setLatLngs([]);
                saveToStorage();
                updateUI();
                document.getElementById('distDisplay').innerText = "0.00";
            }
        }

        function updateUI() {
            document.getElementById('pointCount').innerText = `${history.length} pts`;
        }

        function recenter() {
            if (lastPosition) {
                map.setView([lastPosition.coords.latitude, lastPosition.coords.longitude], 18);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
