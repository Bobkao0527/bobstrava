<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS + 慣性航位紀錄儀 (V4)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        #map { height: 35vh; width: 100%; transition: all 0.5s ease; }
        .stats-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.7); }
        .mode-imu { border: 2px solid #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        .recording-dot { animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-100 h-screen flex flex-col overflow-hidden text-slate-900">

    <!-- 啟動遮罩層 (Permission Overlay) -->
    <div id="setupOverlay" class="fixed inset-0 z-[100] bg-slate-900 flex flex-col items-center justify-center p-8 transition-opacity duration-500">
        <div class="bg-white/10 p-6 rounded-full mb-6">
            <i data-lucide="navigation" class="w-16 h-16 text-white stroke-[1.5]"></i>
        </div>
        <h1 class="text-white text-2xl font-black mb-2 italic tracking-tighter">GPS+IMU TRACKER</h1>
        <p class="text-slate-400 text-center text-sm mb-8 leading-relaxed">
            為了提供高精確度的慣性導航輔助，<br>我們需要取得您的定位與感測器授權。
        </p>
        <button id="entryBtn" class="w-full max-w-xs bg-blue-600 text-white font-black py-4 rounded-2xl shadow-2xl active:scale-95 transition-all text-lg flex items-center justify-center">
            啟動系統 <i data-lucide="chevron-right" class="ml-2"></i>
        </button>
        <p class="text-slate-500 text-[10px] mt-6 uppercase tracking-widest">Optimized for iPhone 12 Pro</p>
    </div>

    <div id="map" class="z-0 shadow-inner"></div>

    <div class="flex-1 flex flex-col p-4 space-y-3 z-10 -mt-6">
        <div id="speedCard" class="stats-card rounded-3xl p-6 shadow-2xl flex flex-col items-center transition-all duration-300">
            <div class="w-full flex justify-between items-start mb-2">
                <div id="modeTag" class="px-2 py-1 rounded-md bg-green-100 text-green-700 text-[10px] font-bold uppercase tracking-widest">
                    GPS 定位中
                </div>
                <div id="recIndicator" class="hidden flex items-center text-red-600 text-[10px] font-black">
                    <span class="w-2 h-2 bg-red-600 rounded-full mr-1 recording-dot"></span> REC
                </div>
            </div>
            
            <div class="flex flex-col items-center">
                <span id="speedDisplay" class="text-8xl font-black italic tracking-tighter text-slate-800 leading-none">0.0</span>
                <span class="text-lg font-bold text-slate-400 mt-2">KM/H</span>
            </div>

            <!-- 向量分量監控 -->
            <div class="w-full grid grid-cols-2 mt-6 pt-4 border-t border-slate-200/50">
                <div class="flex flex-col items-center border-r border-slate-200/50">
                    <span class="text-[10px] text-slate-400 font-bold uppercase">GPS 基準速</span>
                    <span id="baseGpsDisplay" class="text-sm font-mono font-bold">0.0</span>
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-[10px] text-slate-400 font-bold uppercase">慣性累積 (ΔV)</span>
                    <span id="imuDeltaDisplay" class="text-sm font-mono font-bold text-blue-600">+0.0</span>
                </div>
            </div>
        </div>

        <!-- 狀態資訊 -->
        <div class="grid grid-cols-2 gap-3">
            <div class="stats-card rounded-2xl p-4 shadow-md">
                <p class="text-slate-400 text-[10px] font-black uppercase">精確度 / 間隔</p>
                <div class="flex items-baseline mt-1 font-mono">
                    <span id="accDisplay" class="text-lg font-bold">--</span>
                    <span class="text-xs text-slate-400 mx-1">m |</span>
                    <span id="intervalDisplay" class="text-lg font-bold text-orange-500">--</span>
                    <span class="text-xs text-slate-400 ml-1">s</span>
                </div>
            </div>
            <div class="stats-card rounded-2xl p-4 shadow-md">
                <p class="text-slate-400 text-[10px] font-black uppercase">手機傾斜 (Beta)</p>
                <div id="tiltDisplay" class="text-lg font-mono font-bold mt-1">0.0°</div>
            </div>
        </div>

        <!-- 按鈕區 -->
        <div class="mt-auto pb-6 flex space-x-3">
            <button id="recordBtn" class="flex-1 bg-slate-900 text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-all flex items-center justify-center text-lg">
                <i data-lucide="play" class="mr-3 fill-white"></i> START
            </button>
            <button id="clearBtn" class="p-5 bg-white text-slate-400 rounded-2xl shadow-md active:bg-red-50 transition-all">
                <i data-lucide="refresh-ccw" class="w-6 h-6"></i>
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, marker, polyline;
        let isRecording = false;
        
        // 導航運算變數
        let baseGpsSpeed = 0;   // GPS 給出的基礎速度 (m/s)
        let imuDeltaV = 0;      // 慣性積分累積的速度變化 (m/s)
        let lastGpsTime = Date.now();
        let lastImuTime = Date.now();
        
        // 姿態變數 (用於向量投影)
        let phonePitch = 0; // Beta (前後傾斜)
        let phoneRoll = 0;  // Gamma (左右傾斜)
        
        const GPS_TIMEOUT = 1500; // 1.5 秒閾值

        function initApp() {
            // 初始化地圖 (與之前相同)
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([25.03, 121.56], 16);
            L.tileLayer('https://{s}.tile.thunderforest.com/atlas/{z}/{x}/{y}.png?apikey=7c352c8ff4764407914371456977217a').addTo(map);
            polyline = L.polyline([], { color: '#6366f1', weight: 6 }).addTo(map);
            marker = L.circleMarker([0, 0], { radius: 10, fillColor: "#3b82f6", color: "#fff", weight: 3 }).addTo(map);

            setInterval(updateUI, 33);
            lucide.createIcons();
        }

        // 核心授權與啟動邏輯
        document.getElementById('entryBtn').addEventListener('click', async function() {
            const overlay = document.getElementById('setupOverlay');
            
            try {
                // 1. 請求 iOS 動作與方向感應器授權
                if (typeof DeviceMotionEvent.requestPermission === 'function') {
                    const motionRes = await DeviceMotionEvent.requestPermission();
                    const orientRes = await DeviceOrientationEvent.requestPermission();
                    
                    if (motionRes !== 'granted' || orientRes !== 'granted') {
                        alert('需要感應器授權才能運作！');
                        return;
                    }
                }

                // 2. 啟動所有追蹤器
                startGpsTracking();
                startImuTracking();

                // 3. 隱藏遮罩
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.remove(), 500);

            } catch (err) {
                console.error(err);
                alert('啟動失敗：' + err.message);
            }
        });

        function startGpsTracking() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition((pos) => {
                    const { latitude, longitude, accuracy, speed } = pos.coords;
                    const now = Date.now();

                    // 1. 更新 GPS 基準
                    if (speed !== null && speed >= 0) {
                        baseGpsSpeed = speed;
                    }
                    
                    // 2. 校準機制：收到 GPS 時，將慣性偏差歸零
                    imuDeltaV = 0; 
                    lastGpsTime = now;

                    // 地圖更新
                    const latlng = [latitude, longitude];
                    marker.setLatLng(latlng);
                    if (isRecording) polyline.addLatLng(latlng);
                    if (accuracy < 30) map.panTo(latlng);
                    
                    document.getElementById('accDisplay').innerText = accuracy.toFixed(0);
                    document.getElementById('baseGpsDisplay').innerText = (baseGpsSpeed * 3.6).toFixed(1);
                }, (err) => {
                    console.error("GPS Error:", err);
                }, { enableHighAccuracy: true });
            }
        }

        function startImuTracking() {
            // 監聽手機姿態 (投影方向)
            window.addEventListener('deviceorientation', (e) => {
                phonePitch = e.beta || 0; 
                phoneRoll = e.gamma || 0;
                document.getElementById('tiltDisplay').innerText = `${phonePitch.toFixed(1)}°`;
            });

            window.addEventListener('devicemotion', (event) => {
                const now = Date.now();
                const dt = (now - lastImuTime) / 1000;
                lastImuTime = now;

                if (dt <= 0 || dt > 0.5) return;

                const acc = event.acceleration; 
                if (!acc || acc.y === null) return;

                // 向量投影邏輯 (處理 Y 軸與 Z 軸在不同傾角下的前進分量)
                const pitchRad = phonePitch * (Math.PI / 180);
                let aForward = (acc.y * Math.cos(pitchRad)) - (acc.z * Math.sin(pitchRad));

                // 靜態雜訊死區過濾
                if (Math.abs(aForward) < 0.15) aForward = 0;

                // 累積速度變化量 (帶正負號)
                imuDeltaV += aForward * dt;

                // Drift Decay: 長時間無 GPS 則緩慢歸零，防止數值無限飄移
                const gpsGap = (now - lastGpsTime);
                if (gpsGap > 5000) {
                    imuDeltaV *= 0.98; 
                }
            });
        }

        function updateUI() {
            const now = Date.now();
            const gpsGap = now - lastGpsTime;
            const modeTag = document.getElementById('modeTag');
            const speedCard = document.getElementById('speedCard');
            
            let displaySpeedMs = baseGpsSpeed;
            document.getElementById('intervalDisplay').innerText = (gpsGap / 1000).toFixed(1);

            if (gpsGap > GPS_TIMEOUT) {
                // 超過 1.5 秒，啟用航位推算：GPS 基準 + 累積變化量
                displaySpeedMs = baseGpsSpeed + imuDeltaV;
                
                modeTag.innerText = "航位推算 (IMU Active)";
                modeTag.className = "px-2 py-1 rounded-md bg-blue-100 text-blue-700 text-[10px] font-bold uppercase tracking-widest";
                speedCard.classList.add('mode-imu');
            } else {
                displaySpeedMs = baseGpsSpeed;
                modeTag.innerText = "GPS 定位中";
                modeTag.className = "px-2 py-1 rounded-md bg-green-100 text-green-700 text-[10px] font-bold uppercase tracking-widest";
                speedCard.classList.remove('mode-imu');
            }

            const kmh = Math.max(0, displaySpeedMs * 3.6);
            document.getElementById('speedDisplay').innerText = kmh.toFixed(1);
            document.getElementById('imuDeltaDisplay').innerText = 
                (imuDeltaV >= 0 ? '+' : '') + (imuDeltaV * 3.6).toFixed(1);
        }

        // 錄影按鈕改為純粹控制資料儲存標記
        document.getElementById('recordBtn').addEventListener('click', function() {
            isRecording = !isRecording;
            this.innerHTML = isRecording ? 
                `<i data-lucide="square" class="mr-3 fill-red-500 text-red-500"></i> STOP` : 
                `<i data-lucide="play" class="mr-3 fill-white"></i> START`;
            document.getElementById('recIndicator').classList.toggle('hidden', !isRecording);
            lucide.createIcons();
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            if (confirm('重設數據？')) {
                polyline.setLatLngs([]);
                imuDeltaV = 0;
            }
        });

        window.onload = initApp;
    </script>
</body>
</html>
