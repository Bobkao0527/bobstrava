<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS + 慣性航位紀錄儀</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        #map { height: 35vh; width: 100%; }
        .stats-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.7); }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .mode-imu { border: 2px solid #3b82f6; animation: pulse-blue 2s infinite; }
        @keyframes pulse-blue { 0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(59, 130, 246, 0); } 100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); } }
    </style>
</head>
<body class="bg-slate-100 h-screen flex flex-col overflow-hidden text-slate-900">

    <div id="map" class="z-0 shadow-inner"></div>

    <div class="flex-1 flex flex-col p-4 space-y-3 z-10 -mt-6">
        <!-- 核心速度顯示 -->
        <div id="speedCard" class="stats-card rounded-3xl p-6 shadow-2xl flex flex-col items-center transition-all duration-500">
            <div class="w-full flex justify-between items-start mb-2">
                <div id="modeTag" class="px-2 py-1 rounded-md bg-green-100 text-green-700 text-[10px] font-bold uppercase tracking-tighter transition-colors">
                    GPS 鎖定中
                </div>
                <div id="recIndicator" class="hidden flex items-center text-red-600 text-[10px] font-black">
                    <span class="w-2 h-2 bg-red-600 rounded-full mr-1 animate-ping"></span> REC
                </div>
            </div>
            
            <div class="flex flex-col items-center">
                <span id="speedDisplay" class="text-8xl font-black italic tracking-tighter text-slate-800 leading-none">0.0</span>
                <span class="text-lg font-bold text-slate-400 mt-2">KM/H</span>
            </div>

            <div class="w-full grid grid-cols-2 mt-6 pt-4 border-t border-slate-200/50">
                <div class="flex flex-col items-center border-r border-slate-200/50">
                    <span class="text-[10px] text-slate-400 font-bold uppercase">GPS 基準</span>
                    <span id="baseGpsDisplay" class="text-sm font-mono font-bold italic">0.0</span>
                </div>
                <div class="flex flex-col items-center">
                    <span class="text-[10px] text-slate-400 font-bold uppercase">慣性補償 (ΔV)</span>
                    <span id="imuDeltaDisplay" class="text-sm font-mono font-bold italic text-blue-600">+0.0</span>
                </div>
            </div>
        </div>

        <!-- 狀態資訊區 -->
        <div class="grid grid-cols-2 gap-3">
            <div class="stats-card rounded-2xl p-4 shadow-md">
                <p class="text-slate-400 text-[10px] font-black uppercase">定位精確度</p>
                <div class="flex items-baseline mt-1">
                    <p id="accDisplay" class="text-lg font-mono font-bold">--</p>
                    <span class="text-xs ml-1 text-slate-400">m</span>
                </div>
            </div>
            <div class="stats-card rounded-2xl p-4 shadow-md">
                <p class="text-slate-400 text-[10px] font-black uppercase">GPS 更新間隔</p>
                <div class="flex items-baseline mt-1">
                    <p id="intervalDisplay" class="text-lg font-mono font-bold text-orange-500">--</p>
                    <span class="text-xs ml-1 text-slate-400">s</span>
                </div>
            </div>
        </div>

        <!-- 操作按鈕 -->
        <div class="mt-auto pb-6 flex space-x-3">
            <button id="recordBtn" class="flex-1 bg-slate-900 text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-all flex items-center justify-center text-lg">
                <i data-lucide="play" class="mr-3 fill-white"></i> START
            </button>
            <button id="clearBtn" class="p-5 bg-white text-slate-400 rounded-2xl shadow-md active:bg-red-50 active:text-red-500 transition-all">
                <i data-lucide="refresh-ccw" class="w-6 h-6"></i>
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, marker, polyline;
        let isRecording = false;
        let historyData = [];

        // 導航核心變數
        let baseGpsSpeed = 0;      // 最近一次 GPS 取得的速度 (m/s)
        let imuDeltaV = 0;         // 慣性累計的速度變化量 (m/s)
        let lastGpsTime = Date.now();
        let lastImuTime = Date.now();
        let currentPitch = 0;      // 仰角 (用於重力投影)
        
        const GPS_TIMEOUT = 1500;  // 1.5 秒閾值

        function initApp() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([25.03, 121.56], 16);
            L.tileLayer('https://{s}.tile.thunderforest.com/atlas/{z}/{x}/{y}.png?apikey=7c352c8ff4764407914371456977217a').addTo(map);
            
            polyline = L.polyline([], { color: '#6366f1', weight: 6, opacity: 0.6 }).addTo(map);
            marker = L.circleMarker([0, 0], { radius: 10, fillColor: "#3b82f6", color: "#fff", weight: 3, fillOpacity: 1 }).addTo(map);

            startGpsTracking();
            startImuTracking();
            
            // UI 刷新 Loop (每秒 30 次，確保慣性更新順滑)
            setInterval(updateSpeedUI, 33);
            lucide.createIcons();
        }

        // --- GPS 邏輯：基準校準器 ---
        function startGpsTracking() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition((pos) => {
                    const now = Date.now();
                    const { latitude, longitude, accuracy, speed } = pos.coords;
                    
                    // 1. 更新 GPS 基準速度 (m/s)
                    if (speed !== null && speed >= 0) {
                        baseGpsSpeed = speed;
                    }
                    
                    // 2. 關鍵：GPS 訊號進來，重設慣性偏移量
                    imuDeltaV = 0; 
                    lastGpsTime = now;

                    // 更新地圖與資訊
                    const latlng = [latitude, longitude];
                    marker.setLatLng(latlng);
                    if (isRecording) {
                        polyline.addLatLng(latlng);
                        historyData.push({lat: latitude, lng: longitude, t: now});
                    }
                    if (accuracy < 20) map.panTo(latlng);
                    
                    document.getElementById('accDisplay').innerText = accuracy.toFixed(0);
                    document.getElementById('baseGpsDisplay').innerText = (baseGpsSpeed * 3.6).toFixed(1);
                }, null, { enableHighAccuracy: true });
            }
        }

        // --- IMU 邏輯：差分積分器 ---
        function startImuTracking() {
            // 監聽傾斜角 (處理坡度或手機拿法)
            window.addEventListener('deviceorientation', (e) => {
                // beta 是手機前後傾斜角度 (-180 到 180)
                currentPitch = e.beta ? (e.beta * Math.PI / 180) : 0;
            });

            window.addEventListener('devicemotion', (event) => {
                const now = Date.now();
                const dt = (now - lastImuTime) / 1000;
                lastImuTime = now;

                if (dt <= 0 || dt > 0.5) return;

                // 取得線性加速度 (已去重力)
                const acc = event.acceleration;
                if (!acc || acc.y === null) return;

                // 簡單投影：假設移動方向主要在手機 Y 軸 (或合成向量)
                // 為了穩健性，我們取合位移向量，並過濾微小雜訊
                let aForward = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
                
                // 偵測方向：如果 Y 是負值，可能是在減速
                if (acc.y < -0.1) aForward *= -1;

                // 過濾雜訊
                if (Math.abs(aForward) < 0.2) aForward = 0;

                // 積分：ΔV = a * dt
                imuDeltaV += aForward * dt;

                // 防止 IMU 漂移過大 (安全閥：若無 GPS 長期補償，緩慢衰減 ΔV)
                const gpsGap = (now - lastGpsTime);
                if (gpsGap > 5000) imuDeltaV *= 0.99;
            });
        }

        // --- UI 更新：雙模式切換 ---
        function updateSpeedUI() {
            const now = Date.now();
            const gpsGap = now - lastGpsTime;
            const modeTag = document.getElementById('modeTag');
            const speedCard = document.getElementById('speedCard');
            const intervalDisplay = document.getElementById('intervalDisplay');

            let displaySpeedMs = baseGpsSpeed;
            intervalDisplay.innerText = (gpsGap / 1000).toFixed(1);

            // 實作使用者要求：超過 1.5 秒使用累積速度
            if (gpsGap > GPS_TIMEOUT) {
                displaySpeedMs = baseGpsSpeed + imuDeltaV;
                
                modeTag.innerText = "慣性航位推算 (IMU)";
                modeTag.className = "px-2 py-1 rounded-md bg-blue-100 text-blue-700 text-[10px] font-bold uppercase tracking-tighter";
                speedCard.classList.add('mode-imu');
            } else {
                displaySpeedMs = baseGpsSpeed;
                
                modeTag.innerText = "GPS 鎖定中";
                modeTag.className = "px-2 py-1 rounded-md bg-green-100 text-green-700 text-[10px] font-bold uppercase tracking-tighter";
                speedCard.classList.remove('mode-imu');
            }

            // 最終轉換為 km/h
            const kmh = Math.max(0, displaySpeedMs * 3.6);
            document.getElementById('speedDisplay').innerText = kmh.toFixed(1);
            document.getElementById('imuDeltaDisplay').innerText = (imuDeltaV >= 0 ? '+' : '') + (imuDeltaV * 3.6).toFixed(1);
        }

        // --- 互動控制 ---
        document.getElementById('recordBtn').addEventListener('click', async function() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                await DeviceMotionEvent.requestPermission();
                await DeviceOrientationEvent.requestPermission();
            }

            isRecording = !isRecording;
            this.innerHTML = isRecording ? 
                `<i data-lucide="square" class="mr-3 fill-red-500 text-red-500"></i> STOP` : 
                `<i data-lucide="play" class="mr-3 fill-white"></i> START`;
            this.classList.toggle('bg-red-50', isRecording);
            this.classList.toggle('text-red-600', isRecording);
            document.getElementById('recIndicator').classList.toggle('hidden', !isRecording);
            lucide.createIcons();
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            if (confirm('重設所有數據與路徑？')) {
                historyData = [];
                polyline.setLatLngs([]);
                imuDeltaV = 0;
            }
        });

        window.onload = initApp;
    </script>
</body>
</html>
