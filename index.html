<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS + IMU + Magnetometer Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        #map { height: 35vh; width: 100%; transition: all 0.5s ease; }
        .stats-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.7); }
        .mode-imu { border: 2px solid #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
        .compass-ring { transition: transform 0.1s ease-out; }
        .recording-dot { animation: pulse-red 1s infinite; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body class="bg-slate-100 h-screen flex flex-col overflow-hidden text-slate-900">

    <div id="setupOverlay" class="fixed inset-0 z-[100] bg-slate-900 flex flex-col items-center justify-center p-8 transition-opacity duration-500">
        <div class="bg-blue-600/20 p-6 rounded-full mb-6 border border-blue-500/30">
            <i data-lucide="compass" class="w-16 h-16 text-blue-400 animate-spin-slow"></i>
        </div>
        <h1 class="text-white text-2xl font-black mb-2 italic tracking-tighter">ADVANCED TRACKER</h1>
        <p class="text-slate-400 text-center text-sm mb-8 leading-relaxed">
            系統將整合 GPS、加速度計與磁力計<br>以提供高頻率的動態軌跡紀錄。
        </p>
        <button id="entryBtn" class="w-full max-w-xs bg-blue-600 text-white font-black py-4 rounded-2xl shadow-2xl active:scale-95 transition-all text-lg flex items-center justify-center">
            授權並啟動 <i data-lucide="shield-check" class="ml-2"></i>
        </button>
    </div>

    <div id="map" class="z-0 shadow-inner"></div>

    <div class="flex-1 flex flex-col p-4 space-y-3 z-10 -mt-6">
        
        <div id="mainCard" class="stats-card rounded-3xl p-5 shadow-2xl flex flex-col items-center relative transition-all duration-300">
            <!-- 錄影指示器 -->
            <div id="recIndicator" class="hidden absolute top-4 right-6 flex items-center text-red-600 text-[10px] font-black">
                <span class="w-2 h-2 bg-red-600 rounded-full mr-1 recording-dot"></span> REC
            </div>

            <div class="w-full grid grid-cols-3 items-center">
                <!-- 指南針小圖 -->
                <div class="flex flex-col items-center">
                    <div class="relative w-12 h-12 flex items-center justify-center">
                        <div id="compassNeedle" class="compass-ring">
                            <i data-lucide="navigation" class="w-8 h-8 text-red-500 fill-red-500"></i>
                        </div>
                    </div>
                    <span id="headingDisplay" class="text-[10px] font-mono font-bold mt-1">0° N</span>
                </div>

                <!-- 速度顯示 -->
                <div class="flex flex-col items-center">
                    <span id="speedDisplay" class="text-6xl font-black italic tracking-tighter text-slate-800 leading-none">0.0</span>
                    <span class="text-xs font-bold text-slate-400 mt-1 uppercase">km/h</span>
                </div>

                <!-- GPS 狀態 -->
                <div class="flex flex-col items-end">
                    <div id="modeTag" class="px-2 py-1 rounded-md bg-green-100 text-green-700 text-[8px] font-black uppercase mb-1">
                        GPS Fix
                    </div>
                    <span id="accDisplay" class="text-[10px] font-mono font-bold text-slate-500">±0m</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
            <div class="stats-card rounded-2xl p-4 shadow-md">
                <div class="flex items-center text-slate-400 mb-1">
                    <i data-lucide="activity" class="w-3 h-3 mr-1"></i>
                    <span class="text-[9px] font-black uppercase">慣性補償 (ΔV)</span>
                </div>
                <div id="imuDeltaDisplay" class="text-lg font-mono font-bold text-blue-600">+0.0</div>
            </div>
            <div class="stats-card rounded-2xl p-4 shadow-md">
                <div class="flex items-center text-slate-400 mb-1">
                    <i data-lucide="clock" class="w-3 h-3 mr-1"></i>
                    <span class="text-[9px] font-black uppercase">訊號間隔</span>
                </div>
                <div class="flex items-baseline">
                    <span id="intervalDisplay" class="text-lg font-mono font-bold text-orange-500">0.0</span>
                    <span class="text-[10px] ml-1 text-slate-400 font-bold">SEC</span>
                </div>
            </div>
        </div>

        <div class="mt-auto pb-6 flex space-x-3">
            <button id="recordBtn" class="flex-1 bg-slate-900 text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-all flex items-center justify-center text-lg">
                <i data-lucide="play" class="mr-3 fill-white"></i> START
            </button>
            <button id="clearBtn" class="p-5 bg-white text-slate-400 rounded-2xl shadow-md active:bg-red-50 transition-all">
                <i data-lucide="refresh-ccw" class="w-6 h-6"></i>
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, marker, polyline;
        let isRecording = false;
        
        // 速度與時間戳
        let baseGpsSpeed = 0;   
        let imuDeltaV = 0;      
        let lastGpsTime = Date.now();
        let lastImuTime = Date.now();
        
        // 姿態變數
        let phonePitch = 0;
        let phoneHeading = 0; // 磁力計航向 (0-360)
        let lastHeading = 0;  // 用於計算轉彎率

        function initApp() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([25.03, 121.56], 16);
            L.tileLayer('https://{s}.tile.thunderforest.com/atlas/{z}/{x}/{y}.png?apikey=7c352c8ff4764407914371456977217a').addTo(map);
            polyline = L.polyline([], { color: '#3b82f6', weight: 6, lineCap: 'round' }).addTo(map);
            marker = L.circleMarker([0, 0], { radius: 10, fillColor: "#3b82f6", color: "#fff", weight: 3 }).addTo(map);

            setInterval(updateUI, 50); // 高頻率更新 UI (20fps)
            lucide.createIcons();
        }

        document.getElementById('entryBtn').addEventListener('click', async function() {
            const overlay = document.getElementById('setupOverlay');
            try {
                // iOS 專用授權請求
                if (typeof DeviceMotionEvent.requestPermission === 'function') {
                    await DeviceMotionEvent.requestPermission();
                    await DeviceOrientationEvent.requestPermission();
                }
                
                startGpsTracking();
                startSensors(); // 啟動磁力計與加速度計
                
                overlay.classList.add('opacity-0');
                setTimeout(() => overlay.remove(), 500);
            } catch (err) {
                console.error("Authorization failed:", err);
            }
        });

        function startGpsTracking() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition((pos) => {
                    const { latitude, longitude, accuracy, speed } = pos.coords;
                    const now = Date.now();

                    // 更新 GPS 基準速
                    if (speed !== null && speed >= 0) {
                        baseGpsSpeed = speed;
                    }
                    
                    // 重置慣性累積 (每秒校準一次)
                    imuDeltaV = 0; 
                    lastGpsTime = now;

                    const latlng = [latitude, longitude];
                    marker.setLatLng(latlng);
                    if (isRecording) polyline.addLatLng(latlng);
                    if (accuracy < 30) map.panTo(latlng);
                    
                    document.getElementById('accDisplay').innerText = `±${accuracy.toFixed(0)}m`;
                }, (err) => console.log(err), { enableHighAccuracy: true });
            }
        }

        function startSensors() {
            // 1. 磁力計與水平儀 (DeviceOrientation)
            window.addEventListener('deviceorientation', (e) => {
                phonePitch = e.beta || 0; 
                // iOS 使用 webkitCompassHeading 取得真實北方
                phoneHeading = e.webkitCompassHeading || e.alpha || 0;
                
                // 更新指南針 UI
                const needle = document.getElementById('compassNeedle');
                needle.style.transform = `rotate(${phoneHeading}deg)`;
                
                // 更新航向文字
                const directions = ['N', 'NE', 'E', 'SE', 'S', 'SW', 'W', 'NW'];
                const dirIndex = Math.round(phoneHeading / 45) % 8;
                document.getElementById('headingDisplay').innerText = `${Math.round(phoneHeading)}° ${directions[dirIndex]}`;
            });

            // 2. 加速度計 (DeviceMotion)
            window.addEventListener('devicemotion', (event) => {
                const now = Date.now();
                const dt = (now - lastImuTime) / 1000;
                lastImuTime = now;

                if (dt <= 0 || dt > 0.5) return;

                const acc = event.acceleration; 
                if (!acc || acc.y === null) return;

                // 核心改良：轉彎過濾 (Turning Suppression)
                // 計算航向變化率 (Heading Rate)
                const headingDiff = Math.abs(phoneHeading - lastHeading);
                const turnFactor = headingDiff > 5 ? 0.3 : 1.0; // 如果每秒轉彎超過一定程度，降低加速度的信賴度
                lastHeading = phoneHeading;

                const pitchRad = phonePitch * (Math.PI / 180);
                
                // 投影 Y/Z 到前進向量 (排除 X 軸側向力)
                let aForward = (acc.y * Math.cos(pitchRad)) - (acc.z * Math.sin(pitchRad));

                // 噪點門檻與轉彎修正
                if (Math.abs(aForward) < 0.2) aForward = 0;
                
                // 積分累積速度增量 (套用轉彎因數)
                imuDeltaV += (aForward * dt) * turnFactor;

                // 漂移保護
                const gpsGap = (now - lastGpsTime);
                if (gpsGap > 5000) imuDeltaV *= 0.96; // 長時間沒 GPS 則緩慢歸零
            });
        }

        function updateUI() {
            const now = Date.now();
            const gpsGap = now - lastGpsTime;
            const modeTag = document.getElementById('modeTag');
            const mainCard = document.getElementById('mainCard');
            
            let displaySpeedMs = baseGpsSpeed;
            document.getElementById('intervalDisplay').innerText = (gpsGap / 1000).toFixed(1);

            // 判定目前是 GPS 模式還是航位推算模式
            if (gpsGap > 1500) {
                displaySpeedMs = baseGpsSpeed + imuDeltaV;
                modeTag.innerText = "IMU ACTIVE";
                modeTag.className = "px-2 py-1 rounded-md bg-blue-100 text-blue-700 text-[8px] font-black uppercase mb-1";
                mainCard.classList.add('mode-imu');
            } else {
                displaySpeedMs = baseGpsSpeed;
                modeTag.innerText = "GPS FIX";
                modeTag.className = "px-2 py-1 rounded-md bg-green-100 text-green-700 text-[8px] font-black uppercase mb-1";
                mainCard.classList.remove('mode-imu');
            }

            const kmh = Math.max(0, displaySpeedMs * 3.6);
            document.getElementById('speedDisplay').innerText = kmh.toFixed(1);
            document.getElementById('imuDeltaDisplay').innerText = 
                (imuDeltaV >= 0 ? '+' : '') + (imuDeltaV * 3.6).toFixed(1);
        }

        document.getElementById('recordBtn').addEventListener('click', function() {
            isRecording = !isRecording;
            this.innerHTML = isRecording ? 
                `<i data-lucide="square" class="mr-3 fill-red-500 text-red-500"></i> STOP` : 
                `<i data-lucide="play" class="mr-3 fill-white"></i> START`;
            document.getElementById('recIndicator').classList.toggle('hidden', !isRecording);
            lucide.createIcons();
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            if (confirm('是否清空目前路徑？')) {
                polyline.setLatLngs([]);
                imuDeltaV = 0;
            }
        });

        window.onload = initApp;
    </script>
</body>
</html>
