<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ATC Tracker - Vector Fusion Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; background: #020617; color: #f8fafc; }
        .deep-safe-top { padding-top: calc(env(safe-area-inset-top) + 90px); }
        #map { height: 30vh; width: 100%; border-radius: 0 0 2.5rem 2.5rem; filter: grayscale(0.5) brightness(0.8); }
        .atc-btn { transition: all 0.2s; border: 2px solid #1e293b; background: #0f172a; color: #475569; }
        .atc-active { background-color: #2563eb !important; color: white !important; border-color: #60a5fa; box-shadow: 0 0 20px rgba(37, 99, 235, 0.5); }
        .event-btn { transition: all 0.2s; background: #1e293b; border: 1px solid #334155; }
        .event-active { background-color: #dc2626 !important; border-color: #f87171 !important; box-shadow: 0 0 15px rgba(220, 38, 38, 0.4); }
        @keyframes scan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
        .scanning::after { content: ""; position: absolute; inset: 0; background: linear-gradient(to bottom, transparent, rgba(37, 99, 235, 0.2), transparent); animation: scan 2s linear infinite; pointer-events: none; }
        .modal { backdrop-filter: blur(25px); display: none; transition: all 0.3s ease; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- 啟動與權限 -->
    <div id="splash" class="fixed inset-0 z-[2000] bg-slate-950 flex flex-col items-center justify-center p-10 text-center">
        <div class="mb-10 relative">
            <div class="bg-blue-600 p-6 rounded-[2.5rem] shadow-2xl relative z-10"><i data-lucide="navigation-2" class="w-16 h-16 text-white"></i></div>
            <div class="absolute -inset-4 bg-blue-500 blur-2xl opacity-20 animate-pulse"></div>
        </div>
        <h1 class="text-3xl font-black mb-4 tracking-tighter">Vector Fusion v10</h1>
        <p class="text-slate-500 text-sm mb-12 leading-relaxed">融合 GPS 切線方向、磁方位與陀螺儀補償<br>實現高精度慣性速度積分</p>
        <button onclick="unlockSystem()" class="bg-blue-600 hover:bg-blue-500 text-white font-black py-5 px-16 rounded-3xl shadow-2xl active:scale-95 transition-all text-xl uppercase tracking-widest">初始化系統</button>
    </div>

    <!-- 頂部儀表板 (已下移避開導航條) -->
    <div class="relative z-0 deep-safe-top bg-slate-900 overflow-hidden">
        <div id="map"></div>
        <div class="absolute top-[calc(env(safe-area-inset-top)+95px)] left-4 right-4 z-[1000] flex flex-col space-y-3 pointer-events-none">
            <!-- 主要速度與里程卡片 -->
            <div class="bg-slate-950/90 backdrop-blur-2xl p-5 rounded-[2rem] border border-white/10 shadow-2xl pointer-events-auto flex justify-between items-center">
                <div class="flex items-center space-x-5">
                    <div class="flex flex-col items-center">
                        <span class="text-[8px] font-black text-slate-500 uppercase tracking-widest mb-1">km/h</span>
                        <span id="currentSpeed" class="text-5xl font-black text-white italic leading-none">0.0</span>
                    </div>
                    <div class="h-10 w-[1px] bg-white/10"></div>
                    <div class="flex flex-col">
                        <div class="flex items-center space-x-2">
                            <div id="modeDot" class="w-2 h-2 rounded-full bg-green-500"></div>
                            <span id="modeText" class="text-[10px] font-bold text-slate-300 uppercase">GPS Tracked</span>
                        </div>
                        <span id="distanceDisplay" class="text-lg font-black text-blue-400 mt-1 tabular-nums">000.00 <span class="text-[10px]">km</span></span>
                    </div>
                </div>
                <div class="flex flex-col items-end opacity-60">
                    <span id="imuStatus" class="text-[8px] font-bold text-slate-500 uppercase mb-1">IMU Fusion</span>
                    <div id="wakeLockIcon" class="p-2 rounded-full bg-white/5"><i data-lucide="zap" class="w-4 h-4 text-yellow-500"></i></div>
                </div>
            </div>
            <!-- 向量融合指示器 (Debug 用) -->
            <div id="fusionBadge" class="self-start bg-blue-600/20 backdrop-blur px-3 py-1 rounded-full border border-blue-500/30 flex items-center space-x-2 pointer-events-auto">
                <span class="text-[8px] font-black text-blue-400 uppercase italic">Angle Dev:</span>
                <span id="angleDev" class="text-[8px] font-mono text-white">0.0°</span>
            </div>
        </div>
    </div>

    <!-- 操控面板 -->
    <div class="flex-1 bg-slate-950 p-6 flex flex-col space-y-6 rounded-t-[3rem] z-10 -mt-8 border-t border-white/5 shadow-2xl">
        <div class="space-y-3">
            <div class="flex justify-between items-center px-2">
                <span class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em]">ATC Limit Control</span>
                <div class="h-[1px] flex-1 mx-4 bg-white/5"></div>
            </div>
            <div class="grid grid-cols-4 gap-3">
                <button onclick="setAtc(15)" class="atc-btn h-16 rounded-2xl font-black text-2xl">15</button>
                <button onclick="setAtc(25)" class="atc-btn atc-active h-16 rounded-2xl font-black text-2xl">25</button>
                <button onclick="setAtc(35)" class="atc-btn h-16 rounded-2xl font-black text-2xl">35</button>
                <button onclick="setAtc(45)" class="atc-btn h-16 rounded-2xl font-black text-2xl">45</button>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-3">
            <button id="btnDist" onclick="toggleEvent('dist')" class="event-btn flex flex-col items-center justify-center py-5 rounded-3xl active:scale-95 transition-all">
                <i data-lucide="split" class="w-6 h-6 mb-2 text-slate-400"></i>
                <span class="text-[9px] font-bold uppercase tracking-tighter">車距不足</span>
            </button>
            <button id="btnWind" onclick="toggleEvent('wind')" class="event-btn flex flex-col items-center justify-center py-5 rounded-3xl active:scale-95 transition-all">
                <i data-lucide="wind" class="w-6 h-6 mb-2 text-slate-400"></i>
                <span class="text-[9px] font-bold uppercase tracking-tighter">風阻過大</span>
            </button>
            <button id="btnIntru" onclick="toggleEvent('intru')" class="event-btn flex flex-col items-center justify-center py-5 rounded-3xl active:scale-95 transition-all">
                <i data-lucide="shield-x" class="w-6 h-6 mb-2 text-slate-400"></i>
                <span class="text-[9px] font-bold uppercase tracking-tighter">軌道入侵</span>
            </button>
        </div>

        <div class="flex space-x-3 pt-2">
            <button id="recordBtn" onclick="toggleRecording()" class="flex-1 bg-white text-slate-950 font-black py-5 rounded-[2rem] shadow-xl flex items-center justify-center text-xl active:scale-95 transition-all">
                <i data-lucide="play" class="mr-3 fill-slate-900 w-6 h-6"></i> START TRACKING
            </button>
            <button onclick="openHistory()" class="bg-slate-800 p-5 rounded-[2rem] border border-white/5 active:bg-slate-700">
                <i data-lucide="box" class="text-white w-6 h-6"></i>
            </button>
        </div>
    </div>

    <!-- 歷史紀錄 Modal -->
    <div id="historyModal" class="modal fixed inset-0 z-[3000] bg-slate-950/90 flex-col items-center justify-end">
        <div class="bg-slate-900 w-full h-[94vh] rounded-t-[3rem] p-8 flex flex-col border-t border-white/10">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-2xl font-black italic tracking-tighter">TELEMETRY LOGS</h2>
                    <p class="text-[10px] text-slate-500 font-bold uppercase">向量分析與軌跡回放</p>
                </div>
                <button onclick="closeHistory()" class="p-4 bg-slate-800 rounded-full text-white shadow-lg"><i data-lucide="x"></i></button>
            </div>
            <div id="historyList" class="flex-1 overflow-y-auto space-y-6 pb-20 px-1"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, marker, polyline, eventMarkers = [];
        let currentAtc = 25, isRecording = false, events = { dist: false, wind: false, intru: false };
        let tripData = [], tripsHistory = JSON.parse(localStorage.getItem('atc_v10_trips') || '[]');
        
        // --- 核心物理量 ---
        let velocity = 0; // m/s
        let totalDistance = 0; // meters
        let lastGpsPos = null;
        let lastSnapshotPos = null;
        let lastImuTime = performance.now();
        
        // --- 向量融合變數 ---
        let phoneHeading = 0;      // 磁方位角 (手機 $Y$ 軸指的方向)
        let gpsTrackAngle = null;  // GPS 的前進方向切線
        let installationAlpha = 0; // 手機相對於前進方向的夾角 (手機與車軸的夾角)
        let lastYawRate = 0;       // 陀螺儀 $Z$ 軸角速度
        
        let loggerTimer = null;
        let speedSnapshots = [];
        let wakeLock = null;

        async function unlockSystem() {
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                try { await DeviceMotionEvent.requestPermission(); } catch(e) {}
            }
            requestWakeLock();
            document.getElementById('splash').style.display = 'none';
            initApp();
        }

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    document.getElementById('wakeLockIcon').classList.add('text-yellow-500');
                }
            } catch (err) {}
        }

        function initApp() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([25.033, 121.565], 16);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            polyline = L.polyline([], { color: '#3b82f6', weight: 6, opacity: 0.8 }).addTo(map);
            marker = L.circleMarker([0, 0], { radius: 8, fillColor: "#3b82f6", color: "#fff", weight: 3, fillOpacity: 1 }).addTo(map);
            
            startSensors();
            lucide.createIcons();
        }

        function startSensors() {
            // 1. GPS 與 切線角計算
            navigator.geolocation.watchPosition((pos) => {
                const { latitude, longitude, accuracy, speed, heading: gpsHeading } = pos.coords;
                
                if (accuracy <= 20) {
                    // 如果 GPS 提供方向，更新切線角
                    if (gpsHeading !== null) {
                        gpsTrackAngle = gpsHeading;
                        // 更新手機與車軸的安裝夾角
                        // Alpha = 手機方位 - GPS 切線方位
                        installationAlpha = (phoneHeading - gpsTrackAngle + 360) % 360;
                    }
                    
                    if (speed !== null) velocity = speed;
                    lastGpsPos = { lat: latitude, lng: longitude };
                    updateModeUI(true);
                } else {
                    updateModeUI(false);
                }
                
                if (lastGpsPos) {
                    marker.setLatLng([lastGpsPos.lat, lastGpsPos.lng]);
                    if (!isRecording) map.panTo([lastGpsPos.lat, lastGpsPos.lng]);
                }
            }, null, { enableHighAccuracy: true });

            // 2. 磁方位角 (手機 Y 軸指的方向)
            window.addEventListener('deviceorientation', e => {
                phoneHeading = e.webkitCompassHeading || e.alpha || 0;
            });

            // 3. 慣性向量融合積分
            window.addEventListener('devicemotion', e => {
                const now = performance.now();
                const dt = (now - lastImuTime) / 1000;
                lastImuTime = now;
                
                if (!e.acceleration || dt <= 0) return;

                // A. 透過陀螺儀更新夾角 (補足磁力計頻率不足)
                const yawRate = e.rotationRate.z || 0; // deg/s
                installationAlpha = (installationAlpha + yawRate * dt + 360) % 360;
                document.getElementById('angleDev').innerText = `${installationAlpha.toFixed(1)}°`;

                // B. 讀取加速度計 (排除重力後的線性加速度)
                const ax = e.acceleration.x || 0;
                const ay = e.acceleration.y || 0;

                // C. 向量投影算法：計算前進方向的分量
                // 假設手機 Y 軸是正前方，夾角 alpha 是偏離度
                // 前進加速度 = ay*cos(alpha) + ax*sin(alpha)
                const rad = (installationAlpha * Math.PI) / 180;
                // 注意：在物理座標系中，偏離方向的分解
                const aForward = ay * Math.cos(rad) - ax * Math.sin(rad);

                // D. 積分速度 (動態閾值過濾雜訊)
                if (Math.abs(aForward) > 0.15) {
                    velocity += (aForward * dt);
                } else if (velocity < 0.2) {
                    velocity = 0; // 靜止自動歸零
                }
                
                velocity = Math.max(0, velocity);
                speedSnapshots.push(velocity);
                updateUI();
            });
        }

        function updateUI() {
            const kmh = velocity * 3.6;
            document.getElementById('currentSpeed').innerText = kmh.toFixed(1);
            document.body.classList.toggle('overspeed-alert', kmh > currentAtc + 0.5);
            document.getElementById('distanceDisplay').innerHTML = `${(totalDistance/1000).toFixed(2)} <span class="text-[10px]">km</span>`;
        }

        function updateModeUI(isGps) {
            const dot = document.getElementById('modeDot');
            dot.className = `w-2 h-2 rounded-full ${isGps ? 'bg-green-500' : 'bg-blue-500 animate-pulse'}`;
            document.getElementById('modeText').innerText = isGps ? 'GPS Tracked' : 'Vector Fusion';
        }

        function setAtc(val) {
            currentAtc = val;
            document.querySelectorAll('.atc-btn').forEach(b => b.classList.toggle('atc-active', parseInt(b.innerText) === val));
        }

        function toggleEvent(type) {
            events[type] = !events[type];
            document.getElementById('btn' + type.charAt(0).toUpperCase() + type.slice(1, 5)).classList.toggle('event-active', events[type]);
        }

        function toggleRecording() {
            isRecording = !isRecording;
            const btn = document.getElementById('recordBtn');
            if (isRecording) {
                tripData = []; totalDistance = 0; lastSnapshotPos = null;
                polyline.setLatLngs([]);
                eventMarkers.forEach(m => map.removeLayer(m));
                eventMarkers = [];
                btn.innerHTML = `<i data-lucide="square" class="mr-3 fill-red-600 text-red-600 w-6 h-6"></i> STOP`;
                btn.classList.add('bg-red-50', 'text-red-700');
                loggerTimer = setInterval(recordSnapshot, 2000);
            } else {
                clearInterval(loggerTimer);
                saveTrip();
                btn.innerHTML = `<i data-lucide="play" class="mr-3 fill-slate-900 w-6 h-6"></i> START TRACKING`;
                btn.classList.remove('bg-red-50', 'text-red-700');
            }
            lucide.createIcons();
        }

        function getDistance(p1, p2) {
            const R = 6371e3;
            const φ1 = p1.lat * Math.PI/180, φ2 = p2.lat * Math.PI/180;
            const Δφ = (p2.lat-p1.lat) * Math.PI/180, Δλ = (p2.lng-p1.lng) * Math.PI/180;
            const a = Math.sin(Δφ/2)**2 + Math.cos(φ1) * Math.cos(φ2) * Math.sin(Δλ/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function recordSnapshot() {
            if (!lastGpsPos) return;
            const avgV = speedSnapshots.length > 0 ? speedSnapshots.reduce((a,b)=>a+b)/speedSnapshots.length : velocity;
            const dist = avgV * 2;
            
            // 使用 GPS 方向或推算的 Alpha 估算軌跡方位
            const currentTrack = (phoneHeading - installationAlpha + 360) % 360;
            const rad = (currentTrack * Math.PI) / 180;
            
            lastGpsPos.lat += (dist * Math.cos(rad)) / 111320;
            lastGpsPos.lng += (dist * Math.sin(rad)) / (111320 * Math.cos(lastGpsPos.lat * Math.PI / 180));
            
            if (lastSnapshotPos) totalDistance += getDistance(lastSnapshotPos, lastGpsPos);
            lastSnapshotPos = { ...lastGpsPos };

            const snap = { t: Date.now(), lat: lastGpsPos.lat, lng: lastGpsPos.lng, v: (velocity * 3.6), atc: currentAtc, e: { ...events } };
            tripData.push(snap);
            polyline.addLatLng([snap.lat, snap.lng]);
            map.panTo([snap.lat, snap.lng]);

            if (Object.values(events).some(v => v)) {
                const em = L.circleMarker([snap.lat, snap.lng], { radius: 6, color: '#dc2626', fillOpacity: 0.9, weight: 2 }).addTo(map);
                eventMarkers.push(em);
            }
            speedSnapshots = [];
        }

        function saveTrip() {
            if (tripData.length < 2) return;
            tripsHistory.unshift({ id: Date.now(), date: new Date().toLocaleString(), data: tripData, distance: (totalDistance / 1000).toFixed(2) });
            localStorage.setItem('atc_v10_trips', JSON.stringify(tripsHistory));
        }

        function openHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            tripsHistory.forEach(trip => {
                const card = document.createElement('div');
                card.className = "bg-slate-800/50 rounded-[2rem] p-6 border border-white/5 flex flex-col shadow-xl";
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <p class="text-[9px] font-black text-slate-500 uppercase tracking-[0.2em] mb-1">${trip.date}</p>
                            <p class="text-3xl font-black text-white italic">${trip.distance} <span class="text-xs text-blue-500 font-bold uppercase">km</span></p>
                        </div>
                        <button onclick="deleteTrip(${trip.id})" class="text-slate-600 p-2"><i data-lucide="trash-2"></i></button>
                    </div>
                    <div class="h-40 bg-slate-950/50 rounded-3xl p-4 border border-white/5 mb-6">
                        <canvas id="chart-${trip.id}"></canvas>
                    </div>
                    <button onclick="reviewTrip(${trip.id})" class="w-full py-4 bg-blue-600 text-white rounded-2xl text-[10px] font-black tracking-widest uppercase">重現向量軌跡</button>
                `;
                list.appendChild(card);
                renderChart(trip);
            });
            document.getElementById('historyModal').classList.add('active');
            lucide.createIcons();
        }

        function renderChart(trip) {
            const ctx = document.getElementById(`chart-${trip.id}`).getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: trip.data.map((_, i) => i * 2),
                    datasets: [
                        { label: 'Speed', data: trip.data.map(d => d.v), borderColor: '#3b82f6', borderWidth: 3, pointRadius: 0, tension: 0.4 },
                        { label: 'ATC', data: trip.data.map(d => d.atc), borderColor: '#ef4444', borderWidth: 1.5, borderDash: [5, 5], stepped: true, pointRadius: 0 },
                        { 
                            label: 'Events', 
                            data: trip.data.map(d => Object.values(d.e).some(v => v) ? d.v : null), 
                            backgroundColor: '#dc2626',
                            borderColor: '#fff',
                            borderWidth: 1,
                            pointRadius: 4,
                            showLine: false
                        }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        x: { display: false }, 
                        y: { beginAtZero: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#475569', font: { size: 9 } } } 
                    }
                }
            });
        }

        function reviewTrip(id) {
            const trip = tripsHistory.find(t => t.id === id);
            polyline.setLatLngs(trip.data.map(d => [d.lat, d.lng]));
            eventMarkers.forEach(m => map.removeLayer(m));
            eventMarkers = [];
            trip.data.forEach(d => {
                if (Object.values(d.e).some(v => v)) {
                    const em = L.circleMarker([d.lat, d.lng], { radius: 6, color: '#ef4444', fillOpacity: 1 }).addTo(map);
                    eventMarkers.push(em);
                }
            });
            map.fitBounds(polyline.getBounds(), { padding: [80, 80] });
            closeHistory();
        }

        function deleteTrip(id) {
            if (confirm('永久刪除此紀錄？')) {
                tripsHistory = tripsHistory.filter(t => t.id !== id);
                localStorage.setItem('atc_v10_trips', JSON.stringify(tripsHistory));
                openHistory();
            }
        }

        function closeHistory() { document.getElementById('historyModal').classList.remove('active'); }
    </script>
</body>
</html>
