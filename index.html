<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS + 慣性輔助紀錄儀</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        #map { height: 35vh; width: 100%; }
        .stats-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .recording-dot { animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .speed-gradient {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
        }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col overflow-hidden text-slate-900">

    <div id="map" class="z-0"></div>

    <div class="flex-1 flex flex-col p-4 space-y-4 z-10 -mt-4">
        <!-- 核心速度儀表板 -->
        <div class="stats-card rounded-3xl p-6 shadow-2xl flex flex-col items-center justify-center relative border border-white overflow-hidden">
            <div id="recIndicator" class="hidden absolute top-4 right-6 flex items-center text-red-600 text-xs font-bold tracking-widest">
                <span class="w-2 h-2 bg-red-600 rounded-full mr-1 recording-dot"></span> REC
            </div>
            
            <div class="flex flex-col items-center">
                <span class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-1">即時估算速度</span>
                <div class="flex items-baseline">
                    <span id="speedDisplay" class="text-7xl font-black italic tracking-tighter text-slate-800">0.0</span>
                    <span class="text-xl font-bold text-slate-400 ml-2">km/h</span>
                </div>
            </div>

            <!-- 訊號源指示燈 -->
            <div class="flex mt-4 space-x-4">
                <div class="flex items-center space-x-1">
                    <div id="gpsStatus" class="w-2 h-2 rounded-full bg-gray-300 transition-colors"></div>
                    <span class="text-[10px] font-bold text-gray-500">GPS</span>
                </div>
                <div class="flex items-center space-x-1">
                    <div id="imuStatus" class="w-2 h-2 rounded-full bg-gray-300 transition-colors"></div>
                    <span class="text-[10px] font-bold text-gray-500">IMU (慣性)</span>
                </div>
            </div>
        </div>

        <!-- 數據網格 -->
        <div class="grid grid-cols-2 gap-3">
            <div class="stats-card rounded-2xl p-4 shadow-md border border-white/50">
                <p class="text-slate-400 text-[10px] font-black uppercase">座標位置</p>
                <p id="latlngDisplay" class="text-sm font-mono font-medium mt-1">定位中...</p>
            </div>
            <div class="stats-card rounded-2xl p-4 shadow-md border border-white/50">
                <p class="text-slate-400 text-[10px] font-black uppercase">更新間隔 / 精度</p>
                <p id="infoDisplay" class="text-sm font-mono font-medium mt-1">--s / --m</p>
            </div>
        </div>

        <!-- 操作區 -->
        <div class="stats-card rounded-3xl p-5 shadow-lg flex flex-col space-y-4">
            <div class="flex justify-between items-center">
                <div class="flex flex-col">
                    <span class="text-slate-400 text-[10px] font-black uppercase">軌跡紀錄</span>
                    <span id="pointCount" class="text-lg font-bold text-slate-700">0 Points</span>
                </div>
                <button id="clearBtn" class="p-3 rounded-full bg-slate-100 text-slate-400 active:bg-red-100 active:text-red-500 transition-all">
                    <i data-lucide="trash-2" class="w-5 h-5"></i>
                </button>
            </div>
            <button id="recordBtn" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-lg active:scale-95 transition-transform flex items-center justify-center text-lg">
                <i data-lucide="play" class="mr-3 fill-white"></i> START RECORDING
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, marker, circle, polyline;
        let isRecording = false;
        let historyData = JSON.parse(localStorage.getItem('gps_v3_history') || '[]');
        
        // 核心狀態變數
        let lastGpsTime = Date.now();
        let currentSpeedKmh = 0; // GPS 速度
        let imuSpeedKmh = 0;     // 慣性積分速度
        let lastAccel = { x: 0, y: 0, z: 0 };
        let lastImuTime = Date.now();

        function initApp() {
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([25.03, 121.56], 16);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            
            polyline = L.polyline(historyData.map(d => [d.lat, d.lng]), {
                color: '#6366f1', weight: 6, opacity: 0.6
            }).addTo(map);

            marker = L.circleMarker([0, 0], { radius: 10, fillColor: "#6366f1", color: "#fff", weight: 3, opacity: 1, fillOpacity: 1 }).addTo(map);
            circle = L.circle([0, 0], { radius: 0, fillColor: "#6366f1", fillOpacity: 0.1, stroke: false }).addTo(map);

            updateUI();
            startTracking();
            startInertialTracking();
            lucide.createIcons();
        }

        // --- GPS 定位邏輯 ---
        function startTracking() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition((pos) => {
                    const { latitude, longitude, accuracy, speed } = pos.coords;
                    const now = Date.now();
                    const interval = (now - lastGpsTime) / 1000;
                    lastGpsTime = now;

                    // 更新 GPS 速度 (若硬體沒給，這部分會維持 0)
                    if (speed !== null) {
                        currentSpeedKmh = speed * 3.6;
                        imuSpeedKmh = currentSpeedKmh; // 用 GPS 校正慣性速度
                    }

                    // UI 更新
                    document.getElementById('latlngDisplay').innerText = `${latitude.toFixed(4)},${longitude.toFixed(4)}`;
                    document.getElementById('infoDisplay').innerText = `${interval.toFixed(1)}s / ${accuracy.toFixed(0)}m`;
                    
                    const latlng = [latitude, longitude];
                    marker.setLatLng(latlng);
                    circle.setLatLng(latlng).setRadius(accuracy);
                    map.panTo(latlng);

                    if (isRecording) {
                        historyData.push({ lat: latitude, lng: longitude, time: now });
                        localStorage.setItem('gps_v3_history', JSON.stringify(historyData));
                        polyline.addLatLng(latlng);
                        updateUI();
                    }

                    // 閃爍 GPS 狀態燈
                    flashStatus('gpsStatus', '#22c55e');
                }, (err) => console.error(err), { enableHighAccuracy: true });
            }
        }

        // --- 慣性導航輔助 (IMU) ---
        function startInertialTracking() {
            // iOS 需要授權
            if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                // 會在第一次點擊畫定時觸發授權
            }

            window.addEventListener('devicemotion', (event) => {
                const now = Date.now();
                const dt = (now - lastImuTime) / 1000;
                lastImuTime = now;

                if (dt > 0 && dt < 1) {
                    // 取得加速度 (扣除重力影響的線性加速度)
                    const acc = event.acceleration;
                    if (!acc || acc.x === null) return;

                    // 簡單的合成加速度計算 (Magnitude)
                    const aSum = Math.sqrt(acc.x**2 + acc.y**2 + acc.z**2);
                    
                    // 閾值過濾雜訊
                    if (aSum > 0.2) {
                        // 積分計算速度：V = V0 + a*dt
                        // 注意：這只是極簡化的估算，假設加速度方向與運動方向一致
                        imuSpeedKmh += (aSum * dt) * 3.6;
                    } else {
                        // 摩擦力模擬：如果沒加速度，速度緩慢下降
                        imuSpeedKmh *= 0.98;
                    }
                }
                
                flashStatus('imuStatus', '#3b82f6');
                refreshSpeedDisplay();
            });
        }

        // --- UI 更新邏輯 ---
        function refreshSpeedDisplay() {
            // 互補濾波：80% 依賴 GPS 速度(若穩定)，20% 顯示慣性推算
            // 若 GPS 長時間未更新，慣性速度比例會增加
            const gpsGap = (Date.now() - lastGpsTime) / 1000;
            let displaySpeed = currentSpeedKmh;

            if (gpsGap > 1.5) {
                // 如果 GPS 斷掉超過 1.5 秒，使用慣性積分值，但加上衰減防止噴飛
                displaySpeed = imuSpeedKmh * Math.exp(-0.1 * gpsGap);
            }

            document.getElementById('speedDisplay').innerText = Math.max(0, displaySpeed).toFixed(1);
        }

        function flashStatus(id, color) {
            const el = document.getElementById(id);
            el.style.backgroundColor = color;
            setTimeout(() => { el.style.backgroundColor = '#e2e8f0'; }, 100);
        }

        function updateUI() {
            document.getElementById('pointCount').innerText = `${historyData.length} Points`;
        }

        // --- 事件監聽 ---
        document.getElementById('recordBtn').addEventListener('click', async function() {
            // 請求 iOS 權限
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                await DeviceMotionEvent.requestPermission();
            }

            isRecording = !isRecording;
            this.innerHTML = isRecording ? 
                `<i data-lucide="square" class="mr-3 fill-red-500 text-red-500"></i> STOP RECORDING` : 
                `<i data-lucide="play" class="mr-3 fill-white"></i> START RECORDING`;
            this.classList.toggle('bg-red-50', isRecording);
            this.classList.toggle('text-red-600', isRecording);
            document.getElementById('recIndicator').classList.toggle('hidden', !isRecording);
            lucide.createIcons();
        });

        document.getElementById('clearBtn').addEventListener('click', () => {
            if (confirm('清除所有紀錄？')) {
                historyData = [];
                localStorage.removeItem('gps_v3_history');
                polyline.setLatLngs([]);
                updateUI();
            }
        });

        window.onload = initApp;
    </script>
</body>
</html>
