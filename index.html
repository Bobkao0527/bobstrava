<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ATC Navigation Pro - Emergency Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        #map { height: 45vh; width: 100%; background: #f8fafc; }
        .atc-active { background: #0f172a; color: #ffffff; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2); transform: translateY(-2px); }
        .event-active { background: #ef4444 !important; color: white !important; border-color: #f87171 !important; box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }
        @keyframes border-flash { 0%, 100% { box-shadow: inset 0 0 0px #ef4444; } 50% { box-shadow: inset 0 0 60px #ef4444; } }
        .overspeed-alarm { animation: border-flash 0.5s infinite; }
        .glass-panel { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px); }
        .recording-pulse { animation: pulse-red 1.5s infinite; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body id="mainBody" class="bg-slate-50 h-screen flex flex-col overflow-hidden transition-all duration-300">

    <div id="setupOverlay" class="fixed inset-0 z-[9999] bg-slate-900 flex flex-col items-center justify-center p-8 text-center transition-opacity duration-500">
        <div class="mb-6 bg-blue-600/20 p-6 rounded-full text-blue-500">
             <i data-lucide="shield-alert" class="w-16 h-16"></i>
        </div>
        <h1 class="text-white text-3xl font-black italic mb-2 tracking-tighter uppercase">ATC Pro System</h1>
        <p class="text-slate-400 text-sm mb-10 max-w-xs">整合 GPS 慣性導航、ATC 限速管理與緊急事件紀錄系統。</p>
        <button id="entryBtn" class="w-full max-w-xs bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl shadow-2xl transition-all text-xl active:scale-95">啟動導航系統</button>
    </div>

    <div id="historyModal" class="fixed inset-0 z-[5000] bg-slate-50 translate-y-full transition-transform duration-500 flex flex-col">
        <div class="p-6 flex justify-between items-center border-b bg-white">
            <h2 class="text-2xl font-black italic text-slate-900 uppercase tracking-tighter">Trip Archive</h2>
            <button id="closeHistoryBtn" class="p-2 bg-slate-100 rounded-full text-slate-500"><i data-lucide="x"></i></button>
        </div>
        <div id="historyList" class="flex-1 overflow-y-auto p-4 space-y-4 no-scrollbar"></div>
    </div>

    <div id="map" class="relative z-0">
        <div id="recIndicator" class="hidden absolute top-4 right-4 z-[1000] bg-white/90 backdrop-blur px-3 py-1.5 rounded-full shadow-lg flex items-center space-x-2 border border-slate-200">
            <span class="w-2 h-2 bg-red-600 rounded-full recording-pulse"></span>
            <span class="text-[10px] font-black text-slate-800 uppercase tracking-widest">Recording Track</span>
        </div>
    </div>

    <div class="flex-1 glass-panel flex flex-col p-6 space-y-4 -mt-8 rounded-t-[40px] shadow-2xl z-10 relative border-t border-white/50">
        <!-- 速度儀表板 -->
        <div class="flex flex-col items-center py-2">
            <div class="flex items-baseline">
                <span id="currentSpeed" class="text-8xl font-black italic tracking-tighter text-slate-900 leading-none">0.0</span>
                <span class="text-xl font-bold text-slate-400 ml-2 italic uppercase">km/h</span>
            </div>
            <div id="atcLabel" class="mt-2 px-4 py-1 bg-slate-100 rounded-full border border-slate-200">
                <span id="atcStatusLabel" class="text-[10px] font-black text-slate-500 uppercase tracking-widest">ATC LIMIT: 25 KM/H</span>
            </div>
        </div>

        <!-- ATC 檔位選擇 -->
        <div class="grid grid-cols-4 gap-2">
            <button onclick="setAtc(15)" id="atc-15" class="atc-btn bg-white text-slate-900 py-4 rounded-xl font-black text-lg shadow-sm border border-slate-200 transition-all active:scale-90">15</button>
            <button onclick="setAtc(25)" id="atc-25" class="atc-btn atc-active py-4 rounded-xl font-black text-lg shadow-sm border border-slate-200 transition-all active:scale-90">25</button>
            <button onclick="setAtc(35)" id="atc-35" class="atc-btn bg-white text-slate-900 py-4 rounded-xl font-black text-lg shadow-sm border border-slate-200 transition-all active:scale-90">35</button>
            <button onclick="setAtc(45)" id="atc-45" class="atc-btn bg-white text-slate-900 py-4 rounded-xl font-black text-lg shadow-sm border border-slate-200 transition-all active:scale-90">45</button>
        </div>

        <!-- 緊急事件按鈕區 -->
        <div class="grid grid-cols-3 gap-2">
            <button id="btn-dist" onclick="toggleEvent('dist')" class="event-btn bg-white text-slate-400 border border-slate-200 py-3 rounded-xl flex flex-col items-center justify-center transition-all active:scale-95">
                <i data-lucide="between-horizontal" class="w-6 h-6 mb-1"></i>
                <span class="text-[9px] font-black uppercase leading-tight">車距不足</span>
            </button>
            <button id="btn-wind" onclick="toggleEvent('wind')" class="event-btn bg-white text-slate-400 border border-slate-200 py-3 rounded-xl flex flex-col items-center justify-center transition-all active:scale-95">
                <i data-lucide="wind" class="w-6 h-6 mb-1"></i>
                <span class="text-[9px] font-black uppercase leading-tight">風阻過大</span>
            </button>
            <button id="btn-intrusion" onclick="toggleEvent('intrusion')" class="event-btn bg-white text-slate-400 border border-slate-200 py-3 rounded-xl flex flex-col items-center justify-center transition-all active:scale-95">
                <i data-lucide="shield-alert" class="w-6 h-6 mb-1"></i>
                <span class="text-[9px] font-black uppercase leading-tight">軌道入侵</span>
            </button>
        </div>

        <!-- 底部主操作鈕 -->
        <div class="mt-auto grid grid-cols-5 gap-3">
            <button id="mainActionBtn" class="col-span-4 bg-slate-900 text-white font-black py-5 rounded-2xl shadow-xl active:scale-95 transition-all flex items-center justify-center text-lg uppercase italic tracking-wider">
                <i data-lucide="play" class="mr-3 fill-white"></i> Start Trip
            </button>
            <button id="openHistoryBtn" class="col-span-1 bg-white text-slate-400 hover:text-slate-900 rounded-2xl shadow-sm border border-slate-200 flex items-center justify-center active:bg-slate-100 transition-colors">
                <i data-lucide="history" class="w-7 h-7"></i>
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, marker, polyline, historyLayer;
        let isRecording = false;
        let currentAtcLimit = 25;
        let allTrips = JSON.parse(localStorage.getItem('atc_trips_final') || '[]');
        let currentTripPoints = [];

        // 定位與感測器狀態
        let events = { dist: false, wind: false, intrusion: false };
        let baseGpsSpeed = 0, imuDeltaV = 0, currentHeading = 0;
        let lastGpsTime = Date.now(), lastImuTime = Date.now();
        let currentLat = 25.0330, currentLng = 121.5654;

        function initApp() {
            // 初始化極簡風地圖 (CartoDB Positron)
            map = L.map('map', { zoomControl: false, attributionControl: false }).setView([currentLat, currentLng], 17);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            polyline = L.polyline([], { color: '#0f172a', weight: 6, opacity: 0.8, lineCap: 'round' }).addTo(map);
            marker = L.circleMarker([currentLat, currentLng], { radius: 8, fillColor: "#0f172a", color: "#fff", weight: 3, fillOpacity: 1 }).addTo(map);
            historyLayer = L.layerGroup().addTo(map);
            
            lucide.createIcons();
            setInterval(updateUI, 100); 
            setInterval(dataLogger, 2000); 
        }

        document.getElementById('entryBtn').addEventListener('click', async function() {
            try {
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    await DeviceMotionEvent.requestPermission();
                    await DeviceOrientationEvent.requestPermission();
                }
                startGpsTracking();
                startImuTracking();
                document.getElementById('setupOverlay').classList.add('opacity-0');
                setTimeout(() => {
                    document.getElementById('setupOverlay').remove();
                    map.invalidateSize();
                }, 500);
            } catch (err) { console.error("Permission denied", err); }
        });

        function startGpsTracking() {
            navigator.geolocation.watchPosition((pos) => {
                const { latitude, longitude, speed } = pos.coords;
                currentLat = latitude; currentLng = longitude;
                if (speed !== null) baseGpsSpeed = speed;
                imuDeltaV = 0; lastGpsTime = Date.now();
                marker.setLatLng([latitude, longitude]);
                if (!isRecording) map.panTo([latitude, longitude]);
            }, null, { enableHighAccuracy: true });
        }

        function startImuTracking() {
            window.addEventListener('deviceorientation', (e) => {
                currentHeading = e.webkitCompassHeading || e.alpha || 0;
            });
            window.addEventListener('devicemotion', (e) => {
                const now = Date.now();
                const dt = (now - lastImuTime) / 1000;
                lastImuTime = now;
                if (dt <= 0 || dt > 0.5) return;
                const acc = e.acceleration;
                if (!acc || acc.y === null) return;
                // 簡化的前進方向投影
                let aForward = acc.y; 
                if (Math.abs(aForward) < 0.2) aForward = 0;
                imuDeltaV += aForward * dt;
            });
        }

        function setAtc(val) {
            currentAtcLimit = val;
            document.querySelectorAll('.atc-btn').forEach(btn => {
                btn.classList.remove('atc-active');
                btn.classList.add('bg-white', 'text-slate-900');
            });
            const activeBtn = document.getElementById(`atc-${val}`);
            activeBtn.classList.add('atc-active');
            activeBtn.classList.remove('bg-white', 'text-slate-900');
            document.getElementById('atcStatusLabel').innerText = `ATC LIMIT: ${val} KM/H`;
        }

        function toggleEvent(type) {
            events[type] = !events[type];
            document.getElementById(`btn-${type}`).classList.toggle('event-active', events[type]);
        }

        function updateUI() {
            const gpsGap = Date.now() - lastGpsTime;
            let speedMs = (gpsGap > 1500) ? (baseGpsSpeed + imuDeltaV) : baseGpsSpeed;
            let kmh = Math.max(0, speedMs * 3.6);
            document.getElementById('currentSpeed').innerText = kmh.toFixed(1);
            const isOverspeed = kmh > (currentAtcLimit + 0.5);
            document.getElementById('mainBody').classList.toggle('overspeed-alarm', isOverspeed);
        }

        function dataLogger() {
            if (!isRecording) return;
            const now = Date.now();
            const gpsGap = now - lastGpsTime;
            let speedMs = (gpsGap > 1500) ? (baseGpsSpeed + imuDeltaV) : baseGpsSpeed;
            
            // 航位推算位移 (每 2 秒)
            if (gpsGap > 1500) {
                const distance = speedMs * 2.0;
                const headingRad = currentHeading * (Math.PI / 180);
                currentLat += (distance * Math.cos(headingRad)) / 111320;
                currentLng += (distance * Math.sin(headingRad)) / (111320 * Math.cos(currentLat * Math.PI / 180));
                marker.setLatLng([currentLat, currentLng]);
            }

            const point = {
                t: new Date().toLocaleTimeString([], { hour12: false, minute:'2-digit', second:'2-digit' }),
                lat: currentLat,
                lng: currentLng,
                v: parseFloat((speedMs * 3.6).toFixed(1)),
                atc: currentAtcLimit,
                e: { ...events } 
            };
            currentTripPoints.push(point);
            polyline.addLatLng([currentLat, currentLng]);
        }

        document.getElementById('mainActionBtn').addEventListener('click', function() {
            isRecording = !isRecording;
            if (isRecording) {
                currentTripPoints = [];
                polyline.setLatLngs([]);
                historyLayer.clearLayers();
                this.innerHTML = `<i data-lucide="square" class="mr-3 fill-red-500 text-red-500"></i> Stop Trip`;
                this.classList.add('bg-red-50', 'text-red-600');
            } else {
                if (currentTripPoints.length > 1) saveTrip();
                this.innerHTML = `<i data-lucide="play" class="mr-3 fill-white"></i> Start Trip`;
                this.classList.remove('bg-red-50', 'text-red-600');
            }
            document.getElementById('recIndicator').classList.toggle('hidden', !isRecording);
            lucide.createIcons();
        });

        function saveTrip() {
            const trip = {
                id: Date.now(),
                date: new Date().toLocaleString('zh-TW', { hour12: false }),
                points: currentTripPoints
            };
            allTrips.unshift(trip);
            localStorage.setItem('atc_trips_final', JSON.stringify(allTrips));
        }

        document.getElementById('openHistoryBtn').addEventListener('click', () => {
            renderHistory();
            document.getElementById('historyModal').classList.remove('translate-y-full');
        });

        document.getElementById('closeHistoryBtn').addEventListener('click', () => {
            document.getElementById('historyModal').classList.add('translate-y-full');
        });

        function renderHistory() {
            const container = document.getElementById('historyList');
            container.innerHTML = allTrips.length ? '' : '<p class="text-center text-slate-400 py-20 font-bold uppercase tracking-widest text-xs">No Archive Found</p>';
            
            allTrips.forEach(trip => {
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-3xl shadow-sm border border-slate-200 space-y-4";
                
                const eventCount = trip.points.filter(p => p.e.dist || p.e.wind || p.e.intrusion).length;

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-black text-slate-900 italic tracking-tighter uppercase">${trip.date}</h3>
                            <div class="flex space-x-2 mt-1">
                                <span class="text-[9px] font-black bg-slate-100 px-2 py-0.5 rounded text-slate-500 uppercase">${trip.points.length} Pts</span>
                                ${eventCount > 0 ? `<span class="text-[9px] font-black bg-red-600 px-2 py-0.5 rounded text-white uppercase">${eventCount} Events</span>` : ''}
                            </div>
                        </div>
                        <button onclick="deleteTrip(${trip.id})" class="p-2 text-slate-300 hover:text-red-500"><i data-lucide="trash-2" class="w-5 h-5"></i></button>
                    </div>
                    <div class="h-44 w-full bg-slate-50 rounded-2xl overflow-hidden p-2">
                        <canvas id="chart-${trip.id}"></canvas>
                    </div>
                    <button onclick="viewTripOnMap(${trip.id})" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-xs uppercase tracking-widest active:bg-slate-800 transition-all">Review On Map</button>
                `;
                container.appendChild(card);
                createTripChart(`chart-${trip.id}`, trip.points);
            });
            lucide.createIcons();
        }

        function createTripChart(canvasId, points) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            const hasEvent = points.map(p => (p.e.dist || p.e.wind || p.e.intrusion) ? 60 : 0);

            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: points.map(p => p.t),
                    datasets: [
                        { label: 'Speed', data: points.map(p => p.v), borderColor: '#0f172a', borderWidth: 3, fill: false, tension: 0.3, pointRadius: 0 },
                        { label: 'ATC', data: points.map(p => p.atc), borderColor: '#ef4444', borderWidth: 2, borderDash: [5, 5], stepped: true, fill: false, pointRadius: 0 },
                        { label: 'Events', data: hasEvent, backgroundColor: 'rgba(239, 68, 68, 0.1)', borderColor: 'transparent', fill: true, pointRadius: 0, stepped: true }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        x: { display: false },
                        y: { beginAtZero: true, max: 55, grid: { display: false }, ticks: { font: { size: 8, weight: '900' } } }
                    }
                }
            });
        }

        window.deleteTrip = function(id) {
            if (confirm('永久刪除此趟紀錄？')) {
                allTrips = allTrips.filter(t => t.id !== id);
                localStorage.setItem('atc_trips_final', JSON.stringify(allTrips));
                renderHistory();
            }
        };

        window.viewTripOnMap = function(id) {
            const trip = allTrips.find(t => t.id === id);
            if (!trip) return;
            
            historyLayer.clearLayers();
            polyline.setLatLngs(trip.points.map(p => [p.lat, p.lng]));
            
            trip.points.forEach((p) => {
                let msgs = [];
                if (p.e.dist) msgs.push("車距不足");
                if (p.e.wind) msgs.push("風阻過大");
                if (p.e.intrusion) msgs.push("軌道入侵");

                if (msgs.length > 0) {
                    L.circleMarker([p.lat, p.lng], {
                        radius: 6, fillColor: "#ef4444", color: "#fff", weight: 2, fillOpacity: 1
                    }).addTo(historyLayer).bindPopup(`<div class="text-[10px] font-black">警告: ${msgs.join(' / ')}<br>時速: ${p.v} km/h</div>`);
                }
            });

            if (polyline.getLatLngs().length > 0) {
                map.fitBounds(polyline.getBounds(), { padding: [50, 50] });
            }
            document.getElementById('historyModal').classList.add('translate-y-full');
        };

        window.onload = initApp;
    </script>
</body>
</html>
