<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>實時定位地圖</title>
    
    <!-- 設定移動端 Web App 外觀 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="我的定位">
    <meta name="theme-color" content="#3b82f6">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        #map {
            height: 100%;
            width: 100%;
            z-index: 1;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        /* 隱藏 Leaflet 預設的縮放按鈕，我們改用自定義位置 */
        .leaflet-control-zoom {
            display: none;
        }
    </style>
</head>
<body class="bg-gray-100">

    <!-- 頂部標題列 -->
    <div class="fixed top-0 left-0 right-0 z-50 p-4">
        <div class="glass-panel rounded-2xl shadow-lg p-3 flex justify-between items-center max-w-lg mx-auto">
            <div class="flex items-center space-x-2">
                <div class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></div>
                <h1 class="font-bold text-gray-800">實時追蹤中</h1>
            </div>
            <button onclick="toggleFollow()" id="followBtn" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-1.5 rounded-xl text-sm font-semibold transition-all shadow-md active:scale-95">
                取消鎖定
            </button>
        </div>
    </div>

    <!-- 地圖容器 -->
    <div id="map"></div>

    <!-- 底部資訊面板 -->
    <div class="fixed bottom-0 left-0 right-0 z-50 p-6">
        <div class="glass-panel rounded-3xl shadow-2xl p-5 max-w-lg mx-auto transition-transform duration-300" id="infoPanel">
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div class="bg-gray-50 p-3 rounded-2xl">
                    <p class="text-xs text-gray-500 mb-1">緯度 Latitude</p>
                    <p id="lat" class="font-mono font-bold text-gray-800 text-sm">--.-----</p>
                </div>
                <div class="bg-gray-50 p-3 rounded-2xl">
                    <p class="text-xs text-gray-500 mb-1">經度 Longitude</p>
                    <p id="lng" class="font-mono font-bold text-gray-800 text-sm">--.-----</p>
                </div>
            </div>
            <div class="flex justify-between items-center text-xs text-gray-500">
                <span>誤差範圍: <span id="accuracy" class="font-bold text-blue-600">--</span> 公尺</span>
                <span>更新時間: <span id="time">尚未更新</span></span>
            </div>
            
            <div class="mt-4 pt-4 border-t border-gray-100 flex gap-2">
                <button onclick="recenter()" class="flex-1 bg-gray-800 text-white py-3 rounded-2xl font-bold active:scale-95 transition-all">
                    回到中心
                </button>
                <button onclick="shareLocation()" class="w-14 bg-gray-200 flex items-center justify-center rounded-2xl active:scale-95 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        let map, marker, circle, watchId;
        let isFollowing = true;
        let lastCoords = null;

        function initMap() {
            // 初始化地圖，預設中心點 (台北)
            map = L.map('map', {
                zoomControl: false,
                tap: false // 解決某些移動端點擊延遲
            }).setView([25.0330, 121.5654], 16);

            // 載入地圖樣式 (使用 CartoDB Positron 比較清爽)
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
            }).addTo(map);

            // 監聽地圖拖動事件，如果使用者手動移動地圖，則停止自動鎖定
            map.on('dragstart', () => {
                if (isFollowing) {
                    toggleFollow(false);
                }
            });

            startTracking();
        }

        function startTracking() {
            if (!navigator.geolocation) {
                alert("抱歉，您的瀏覽器不支援定位功能。");
                return;
            }

            const options = {
                enableHighAccuracy: true, // 高精準度
                timeout: 10000,           // 逾時
                maximumAge: 0             // 不使用快取
            };

            watchId = navigator.geolocation.watchPosition(updatePosition, handleError, options);
        }

        function updatePosition(position) {
            const lat = position.coords.latitude;
            const lng = position.coords.longitude;
            const accuracy = position.coords.accuracy;
            const timestamp = new Date(position.timestamp).toLocaleTimeString();

            lastCoords = [lat, lng];

            // 更新 UI 數據
            document.getElementById('lat').innerText = lat.toFixed(6);
            document.getElementById('lng').innerText = lng.toFixed(6);
            document.getElementById('accuracy').innerText = Math.round(accuracy);
            document.getElementById('time').innerText = timestamp;

            // 更新地圖標記
            if (!marker) {
                // 首次定位，建立藍色定位點
                const customIcon = L.divIcon({
                    className: 'relative',
                    html: `<div class="w-5 h-5 bg-blue-500 border-2 border-white rounded-full shadow-lg"></div>
                           <div class="absolute inset-0 w-5 h-5 bg-blue-400 rounded-full animate-ping opacity-75"></div>`,
                    iconSize: [20, 20],
                    iconAnchor: [10, 10]
                });
                marker = L.marker([lat, lng], { icon: customIcon }).addTo(map);
                circle = L.circle([lat, lng], {
                    radius: accuracy,
                    color: '#3b82f6',
                    fillColor: '#3b82f6',
                    fillOpacity: 0.1,
                    weight: 1
                }).addTo(map);
            } else {
                // 更新現有標記位置
                marker.setLatLng([lat, lng]);
                circle.setLatLng([lat, lng]);
                circle.setRadius(accuracy);
            }

            // 如果處於跟隨模式，自動移動地圖中心
            if (isFollowing) {
                map.setView([lat, lng], map.getZoom());
            }
        }

        function handleError(error) {
            let msg = "";
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    msg = "請允許地圖存取您的定位權限。";
                    break;
                case error.POSITION_UNAVAILABLE:
                    msg = "無法取得當前位置資訊。";
                    break;
                case error.TIMEOUT:
                    msg = "定位請求逾時。";
                    break;
                default:
                    msg = "發生未知錯誤。";
                    break;
            }
            console.error("Geolocation Error: " + msg);
        }

        function toggleFollow(forceState) {
            isFollowing = (forceState !== undefined) ? forceState : !isFollowing;
            const btn = document.getElementById('followBtn');
            if (isFollowing) {
                btn.innerText = "取消鎖定";
                btn.classList.replace('bg-gray-200', 'bg-blue-500');
                btn.classList.replace('text-gray-700', 'white');
                if (lastCoords) map.setView(lastCoords, map.getZoom());
            } else {
                btn.innerText = "鎖定位置";
                btn.classList.replace('bg-blue-500', 'bg-gray-200');
                btn.classList.replace('text-white', 'text-gray-700');
            }
        }

        function recenter() {
            if (lastCoords) {
                toggleFollow(true);
                map.setView(lastCoords, 18);
            }
        }

        function shareLocation() {
            if (!lastCoords) return;
            const url = `https://www.google.com/maps?q=${lastCoords[0]},${lastCoords[1]}`;
            const tempInput = document.createElement("input");
            tempInput.value = url;
            document.body.appendChild(tempInput);
            tempInput.select();
            document.execCommand("copy");
            document.body.removeChild(tempInput);
            
            // 簡單的提示回饋
            const btn = event.currentTarget;
            const originalColor = btn.style.backgroundColor;
            btn.style.backgroundColor = "#dcfce7";
            setTimeout(() => btn.style.backgroundColor = originalColor, 1000);
            
            console.log("位置連結已複製到剪貼簿");
        }

        // 當頁面載入完成後初始化
        window.onload = initMap;
    </script>
</body>
</html>
