<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS 紀錄儀</title>
    <!-- PWA Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GPS 紀錄">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        #map { height: 40vh; width: 100%; }
        .stats-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        .recording-dot { animation: blink 1s infinite; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex flex-col overflow-hidden">

    <!-- 頂部地圖 -->
    <div id="map" class="shadow-md"></div>

    <!-- 數據儀表板 -->
    <div class="flex-1 flex flex-col p-4 space-y-4 overflow-y-auto">
        
        <!-- 速度顯示區 -->
        <div class="stats-card rounded-3xl p-6 shadow-xl flex flex-col items-center justify-center relative border border-white">
            <div id="recIndicator" class="hidden absolute top-4 right-6 flex items-center text-red-600 text-xs font-bold tracking-widest">
                <span class="w-2 h-2 bg-red-600 rounded-full mr-1 recording-dot"></span> REC
            </div>
            <span class="text-gray-500 text-sm font-medium uppercase tracking-widest">目前速度</span>
            <div class="flex items-baseline">
                <span id="speed" class="text-7xl font-black text-slate-800">0.0</span>
                <span class="text-xl font-bold text-gray-400 ml-2">km/h</span>
            </div>
        </div>

        <!-- 詳細資訊欄 -->
        <div class="grid grid-cols-2 gap-4">
            <div class="stats-card rounded-2xl p-4 shadow-sm">
                <p class="text-gray-400 text-[10px] uppercase font-bold tracking-wider">經緯度</p>
                <p id="latlng" class="text-sm font-mono text-slate-700 mt-1">等待信號...</p>
            </div>
            <div class="stats-card rounded-2xl p-4 shadow-sm">
                <p class="text-gray-400 text-[10px] uppercase font-bold tracking-wider">精確度</p>
                <p id="accuracy" class="text-sm font-mono text-slate-700 mt-1">-- m</p>
            </div>
        </div>

        <!-- 紀錄管理 -->
        <div class="stats-card rounded-2xl p-4 shadow-sm flex flex-col">
            <div class="flex justify-between items-center mb-2">
                <p class="text-gray-400 text-[10px] uppercase font-bold tracking-wider">歷史紀錄管理</p>
                <span id="count" class="bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full text-[10px] font-bold">0 點</span>
            </div>
            <div class="flex space-x-2">
                <button id="toggleBtn" class="flex-1 bg-slate-900 text-white font-bold py-4 rounded-xl shadow-lg active:scale-95 transition-transform flex items-center justify-center">
                    <i data-lucide="play" class="mr-2 w-5 h-5"></i> 開始記錄
                </button>
                <button id="clearBtn" class="bg-gray-200 text-gray-600 p-4 rounded-xl active:bg-red-100 active:text-red-600 transition-colors">
                    <i data-lucide="trash-2" class="w-6 h-6"></i>
                </button>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        let map, marker, circle, polyline;
        let isRecording = false;
        let historyData = JSON.parse(localStorage.getItem('gps_history') || '[]');
        let lastPosition = null;

        // 初始化地圖
        function initMap() {
            map = L.map('map', {
                zoomControl: false,
                attributionControl: false
            }).setView([25.0330, 121.5654], 16);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            polyline = L.polyline(historyData.map(d => [d.lat, d.lng]), {
                color: '#3b82f6',
                weight: 5,
                opacity: 0.7
            }).addTo(map);

            marker = L.circleMarker([0, 0], {
                radius: 8,
                fillColor: "#3b82f6",
                color: "#fff",
                weight: 3,
                opacity: 1,
                fillOpacity: 1
            }).addTo(map);

            circle = L.circle([0, 0], {
                radius: 0,
                fillColor: "#3b82f6",
                fillOpacity: 0.1,
                stroke: false
            }).addTo(map);
            
            updateHistoryCount();
            lucide.createIcons();
        }

        // 計算兩點間距離 (公尺)
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function updatePosition(position) {
            const { latitude, longitude, accuracy, speed, timestamp } = position.coords;
            const currentLatLng = [latitude, longitude];
            
            // 1. 更新地圖位置
            marker.setLatLng(currentLatLng);
            circle.setLatLng(currentLatLng);
            circle.setRadius(accuracy);
            map.panTo(currentLatLng);

            // 2. 更新 UI 資訊
            document.getElementById('latlng').innerText = `${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;
            document.getElementById('accuracy').innerText = `${accuracy.toFixed(1)} m`;

            // 3. 處理速度 (優先使用硬體速度，否則手動計算)
            let currentSpeedKmh = 0;
            if (speed !== null && speed !== undefined) {
                currentSpeedKmh = speed * 3.6; // m/s to km/h
            } else if (lastPosition) {
                const dist = calculateDistance(lastPosition.lat, lastPosition.lng, latitude, longitude);
                const timeDiff = (timestamp - lastPosition.time) / 1000; // 秒
                if (timeDiff > 0 && dist < 100) { // 排除跳轉過大的雜訊
                    currentSpeedKmh = (dist / timeDiff) * 3.6;
                }
            }
            document.getElementById('speed').innerText = currentSpeedKmh.toFixed(1);

            // 4. 儲存紀錄
            if (isRecording) {
                const dataPoint = { lat: latitude, lng: longitude, speed: currentSpeedKmh, time: timestamp };
                historyData.push(dataPoint);
                localStorage.setItem('gps_history', JSON.stringify(historyData));
                polyline.addLatLng(currentLatLng);
                updateHistoryCount();
            }

            lastPosition = { lat: latitude, lng: longitude, time: timestamp };
        }

        function updateHistoryCount() {
            document.getElementById('count').innerText = `${historyData.length} 點`;
        }

        // 按鈕事件
        document.getElementById('toggleBtn').addEventListener('click', function() {
            isRecording = !isRecording;
            const btn = this;
            const recLabel = document.getElementById('recIndicator');
            
            if (isRecording) {
                btn.innerHTML = `<i data-lucide="square" class="mr-2 w-5 h-5 text-red-500"></i> 停止記錄`;
                btn.classList.replace('bg-slate-900', 'bg-red-50');
                btn.classList.add('text-red-600', 'border', 'border-red-200');
                recLabel.classList.remove('hidden');
            } else {
                btn.innerHTML = `<i data-lucide="play" class="mr-2 w-5 h-5"></i> 開始記錄`;
                btn.classList.remove('bg-red-50', 'text-red-600', 'border', 'border-red-200');
                btn.classList.add('bg-slate-900', 'text-white');
                recLabel.classList.add('hidden');
            }
            lucide.createIcons();
        });

        document.getElementById('clearBtn').addEventListener('click', function() {
            if (confirm('確定要清空所有歷史路徑嗎？')) {
                historyData = [];
                localStorage.removeItem('gps_history');
                polyline.setLatLngs([]);
                updateHistoryCount();
            }
        });

        // 啟動定位追蹤
        window.onload = () => {
            initMap();
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition(updatePosition, 
                    (err) => console.error(err), 
                    { enableHighAccuracy: true, maximumAge: 0 }
                );
            } else {
                alert("此裝置不支援定位功能");
            }
        };
    </script>
</body>
</html>
